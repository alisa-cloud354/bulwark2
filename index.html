<!DOCTYPE html>
<html lang="be">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulwark Admin</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div id="app">
        <aside id="sidebar">
            <div class="logo">
                Bulwark Admin
                <button id="menu-toggle">☰</button>
            </div>
            <nav>
                <a href="#" data-section="news" class="nav-link active">Навіны</a>
                <a href="#" data-section="reports" class="nav-link">Справаздачы</a>
                <a href="#" data-section="gallery" class="nav-link">Галерэя</a>
                <a href="#" data-section="materials" class="nav-link">Матэрыялы</a>
                <button id="logout-btn"
                    style="background:transparent; border:1px solid #333; color:#666; padding:8px 16px; font-size:11px; cursor:pointer; margin-top:auto; width:100%;">Выйсці</button>
            </nav>
        </aside>
        <main id="content">
            <div id="section-news" class="section active"></div>
            <div id="section-reports" class="section"></div>
            <div id="section-gallery" class="section"></div>
            <div id="section-materials" class="section"></div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
